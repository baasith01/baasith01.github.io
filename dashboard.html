<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter','Segoe UI',sans-serif;
}
body{
background:#f1f5f9;
display:flex;
min-height:100vh;
color:#0f172a;
}
.sidebar{
width:280px;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
padding:30px 20px;
position:fixed;
height:100vh;
overflow-y:auto;
box-shadow:4px 0 20px rgba(0,0,0,.08);
}
.sidebar h2{
text-align:center;
margin-bottom:35px;
font-size:24px;
font-weight:700;
}
.sidebar button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
cursor:pointer;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
font-weight:500;
transition:.3s;
}
.sidebar button:hover{
background:#2563eb;
transform:translateX(5px);
}
.main{
margin-left:280px;
padding:35px;
width:100%;
}
.card{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(15,23,42,.08);
border:1px solid #e2e8f0;
}
.card h2{
margin-bottom:18px;
font-size:24px;
color:#0f172a;
}
.card h3{
margin-bottom:15px;
color:#334155;
}
input,
textarea{
width:100%;
padding:14px;
margin-top:12px;
border:1px solid #cbd5e1;
border-radius:12px;
background:white;
font-size:15px;
transition:.3s;
}
input:focus,
textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 4px rgba(37,99,235,.15);
}
textarea{
resize:none;
}
.primary-btn{
background:#2563eb;
color:white;
border:none;
padding:14px;
margin-top:15px;
border-radius:12px;
cursor:pointer;
width:100%;
font-size:15px;
font-weight:600;
transition:.3s;
}
.primary-btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}
.danger-btn{
background:#ef4444;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
margin-left:8px;
}
.danger-btn:hover{
background:#dc2626;
}
.skill-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-top:12px;
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:12px;
}
.skill-item span{
font-weight:500;
}
.skill-item button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
margin-left:8px;
}
.profile-preview{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
margin-top:20px;
border:6px solid #2563eb;
box-shadow:0 10px 30px rgba(37,99,235,.25);
}
.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}
.card a{
color:#2563eb;
text-decoration:none;
font-weight:600;
}
.card a:hover{
text-decoration:underline;
}
hr{
border:none;
height:1px;
background:#e2e8f0;
margin:25px 0;
}
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-thumb{
background:#94a3b8;
border-radius:20px;
}
@media(max-width:900px){
.sidebar{
width:100%;
height:auto;
position:relative;
}
.main{
margin-left:0;
padding:20px;
}
body{
flex-direction:column;
}
}
</style>
</head>
<body>

<div class="sidebar">
<h2>Admin Panel</h2>
<button onclick="showSection('profileSection')">Profile Image</button>
<button onclick="showSection('profileInfoSection')">Profile Info</button>
<button onclick="showSection('aboutSection')">About Me</button>
<button onclick="showSection('skillsSection')">Skills</button>
<button onclick="showSection('projectsSection')">Projects</button>
<button onclick="showSection('certificatesSection')">Certificates</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<div class="card section" id="profileSection">
<h2>Profile Image</h2>
<input type="file" id="profile-input" accept="image/*">
<button class="primary-btn" onclick="uploadProfileImage()">Upload Profile Image</button>
<img id="profilePreview" class="profile-preview">
</div>

<div class="card section" id="profileInfoSection" style="display:none;">
<h2>Profile Information</h2>
<input type="text" id="profileName" placeholder="Your Name">
<input type="text" id="profileTitle" placeholder="Your Title">
<input type="text" id="resumeUrl" placeholder="Resume URL">
<button class="primary-btn" onclick="updateProfileInfo()">Save Profile Information</button>
</div>

<div class="card section" id="aboutSection" style="display:none;">
<h2>About Me</h2>
<textarea id="about-text" rows="6"></textarea>
<button class="primary-btn" onclick="updateAbout()">Save About</button>
</div>

<div class="card section" id="skillsSection" style="display:none;">
<h2>Skills</h2>
<input type="text" id="skillInput" placeholder="Enter Skill">
<button class="primary-btn" onclick="addSkill()">Add Skill</button>
<div id="skillsList"></div>
</div>

<div class="card section" id="projectsSection" style="display:none;">
<h2>Projects</h2>
<h3>Add Project</h3>
<input type="text" id="projectName" placeholder="Project Name">
<textarea id="projectDesc" placeholder="Project Description"></textarea>
<input type="text" id="githubLink" placeholder="GitHub Link">
<input type="file" id="projectImage" accept="image/*">
<button class="primary-btn" onclick="addProject()">Add Project</button>
<hr style="margin:20px 0;">
<div id="projectsList"></div>
</div>

<div class="card section" id="certificatesSection" style="display:none;">
<h2>Certificates</h2>
<h3>Add Certificate</h3>
<input type="text" id="certificateName" placeholder="Certificate Name">
<textarea id="certificateDesc" placeholder="Certificate Description"></textarea>
<input type="file" id="certificateImage" accept="image/*">
<button class="primary-btn" onclick="addCertificate()">Add Certificate</button>
<hr style="margin:20px 0;">
<div id="certificatesList"></div>
</div>
</div>

<script>
/* ==========================
SUPABASE CONFIG
========================== */
const supabaseUrl = "https://aibktgsfztgcdwoqqzlw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpYmt0Z3NmenRnY2R3b3Fxemx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjQ0ODcsImV4cCI6MjA5NjU0MDQ4N30.rXylwzImlx5ZdQMpDIeRGkXSS4hVaRAOTv4Op_Wsae0";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

/* ==========================
AUTH CHECK
========================== */
async function checkAuth(){
const { data:{session} } = await supabaseClient.auth.getSession();
if(!session){ window.location.href = "login.html"; }
}
checkAuth();

/* ==========================
SECTION SWITCH
========================== */
function showSection(id){
document.querySelectorAll(".section").forEach(section=>{ section.style.display = "none"; });
document.getElementById(id).style.display = "block";
}

/* ==========================
LOGOUT
========================== */
async function logout(){
await supabaseClient.auth.signOut();
window.location.href = "login.html";
}

/* ==========================
PROFILE IMAGE
========================== */
async function uploadProfileImage(){
const file = document.getElementById("profile-input").files[0];
if(!file){ alert("Select Image"); return; }
const fileName = Date.now() + "-" + file.name;
const {error} = await supabaseClient.storage.from("profile-images").upload(fileName, file);
if(error){ alert(error.message); return; }
const {data} = supabaseClient.storage.from("profile-images").getPublicUrl(fileName);

// Upsert row 1
await supabaseClient.from("about_me").upsert({ id: 1, image_url: data.publicUrl });
loadProfile();
alert("Profile Updated");
}

async function loadProfile(){
const {data} = await supabaseClient.from("about_me").select("*").maybeSingle();
if(data && data.image_url){
document.getElementById("profilePreview").src = data.image_url;
}
}

/* ==========================
PROFILE INFO
========================== */
async function loadProfileInfo(){
const {data} = await supabaseClient.from("profile_info").select("*").maybeSingle();
if(data){
document.getElementById("profileName").value = data.name || "";
document.getElementById("profileTitle").value = data.title || "";
document.getElementById("resumeUrl").value = data.resume_url || "";
}
}

async function updateProfileInfo(){
await supabaseClient.from("profile_info").upsert({
id: 1,
name: document.getElementById("profileName").value,
title: document.getElementById("profileTitle").value,
resume_url: document.getElementById("resumeUrl").value
});
alert("Profile Information Updated");
}

/* ==========================
ABOUT
========================== */
async function loadAbout(){
const {data} = await supabaseClient.from("about_me").select("*").maybeSingle();
if(data){ document.getElementById("about-text").value = data.content || ""; }
}

async function updateAbout(){
await supabaseClient.from("about_me").upsert({
id: 1,
content: document.getElementById("about-text").value
});
alert("About Updated");
}

/* ==========================
SKILLS
========================== */
async function addSkill(){
const skill = document.getElementById("skillInput").value;
if(!skill) return;
await supabaseClient.from("skills").insert([{ skill_name: skill }]);
document.getElementById("skillInput").value = "";
loadSkills();
}

async function deleteSkill(id){
await supabaseClient.from("skills").delete().eq("id",id);
loadSkills();
}

async function editSkill(id, currentSkill){
const newSkill = prompt("Edit Skill", currentSkill);
if(!newSkill) return;
await supabaseClient.from("skills").update({ skill_name: newSkill }).eq("id",id);
loadSkills();
}

async function loadSkills(){
const {data} = await supabaseClient.from("skills").select("*");
const list = document.getElementById("skillsList");
list.innerHTML = "";
if(data) {
data.forEach(skill=>{
list.innerHTML += `
<div class="skill-item">
<span>${skill.skill_name}</span>
<div>
<button onclick="editSkill(${skill.id}, '${skill.skill_name}')">Edit</button>
<button class="danger-btn" onclick="deleteSkill(${skill.id})">Delete</button>
</div>
</div>`;
});
}
}  

/* ==========================
PROJECTS
========================== */
async function addProject(){
const file = document.getElementById("projectImage").files[0];
let imageUrl = "";
if(file){
const fileName = Date.now() + "-" + file.name;
const {error} = await supabaseClient.storage.from("project-images").upload(fileName, file);
if(error){ alert(error.message); return; }
const {data} = supabaseClient.storage.from("project-images").getPublicUrl(fileName);
imageUrl = data.publicUrl;
}

await supabaseClient.from("projects").insert([{
name: document.getElementById("projectName").value,
description: document.getElementById("projectDesc").value,
github_link: document.getElementById("githubLink").value,
image_url: imageUrl
}]);

document.getElementById("projectName").value = "";
document.getElementById("projectDesc").value = "";
document.getElementById("githubLink").value = "";
loadProjects();
}

async function deleteProject(id){
await supabaseClient.from("projects").delete().eq("id",id);
loadProjects();
}

async function editProject(id, currentName, currentDescription, currentGithub){
const newName = prompt("Edit Project Name", currentName);
if(!newName) return;
const newDescription = prompt("Edit Project Description", currentDescription);
if(!newDescription) return;
const newGithub = prompt("Edit Github Link", currentGithub);
await supabaseClient.from("projects").update({ name:newName, description:newDescription, github_link:newGithub }).eq("id",id);
loadProjects();
}

async function changeProjectImage(projectId){
const input = document.createElement("input");
input.type = "file"; input.accept = "image/*";
input.onchange = async ()=>{
const file = input.files[0];
if(!file) return;
const fileName = Date.now() + "-" + file.name;
const {error} = await supabaseClient.storage.from("project-images").upload(fileName, file);
if(error){ alert(error.message); return; }
const {data} = supabaseClient.storage.from("project-images").getPublicUrl(fileName);
await supabaseClient.from("projects").update({ image_url: data.publicUrl }).eq("id", projectId);
loadProjects();
};
input.click();
}

async function loadProjects(){
const {data} = await supabaseClient.from("projects").select("*").order("id", {ascending:false});
const list = document.getElementById("projectsList");
list.innerHTML = "";
if(data){
data.forEach(project=>{
list.innerHTML += `
<div class="card">
${project.image_url ? `<img src="${project.image_url}">` : ''}
<h3>${project.name}</h3>
<p>${project.description}</p>
<p><a href="${project.github_link}" target="_blank">GitHub Link</a></p>
<button onclick="editProject(${project.id},'${project.name}','${project.description}','${project.github_link}')">Edit</button>
<button onclick="changeProjectImage(${project.id})">Change Image</button>
<button class="danger-btn" onclick="deleteProject(${project.id})">Delete</button>
</div>`;
});
}
}

/* ==========================
CERTIFICATES
========================== */
async function addCertificate(){
const file = document.getElementById("certificateImage").files[0];
let imageUrl = "";
if(file){
const fileName = Date.now() + "-" + file.name;
const {error} = await supabaseClient.storage.from("certificate-images").upload(fileName, file);
if(error){ alert(error.message); return; }
const {data} = supabaseClient.storage.from("certificate-images").getPublicUrl(fileName);
imageUrl = data.publicUrl;
}

await supabaseClient.from("certificates").insert([{
certificate_name: document.getElementById("certificateName").value,
description: document.getElementById("certificateDesc").value,
image_url: imageUrl
}]);

document.getElementById("certificateName").value = "";
document.getElementById("certificateDesc").value = "";
loadCertificates();
}

async function deleteCertificate(id){
await supabaseClient.from("certificates").delete().eq("id",id);
loadCertificates();
}

async function editCertificate(id, currentName, currentDescription){
const newName = prompt("Edit Certificate Name", currentName);
if(!newName) return;
const newDescription = prompt("Edit Certificate Description", currentDescription);
if(!newDescription) return;
await supabaseClient.from("certificates").update({ certificate_name: newName, description: newDescription }).eq("id",id);
loadCertificates();
}

async function loadCertificates(){
const {data} = await supabaseClient.from("certificates").select("*").order("id", {ascending:false});
const list = document.getElementById("certificatesList");
list.innerHTML = "";
if(data){
data.forEach(cert=>{
list.innerHTML += `
<div class="card">
${cert.image_url ? `<img src="${cert.image_url}">` : ''}
<h3>${cert.certificate_name}</h3>
<p>${cert.description}</p>
<button onclick="editCertificate(${cert.id},'${cert.certificate_name}','${cert.description}')">Edit</button>
<button class="danger-btn" onclick="deleteCertificate(${cert.id})">Delete</button>
</div>`;
});
}
}

/* ==========================
INITIAL LOAD
========================== */
loadProfile();
loadProfileInfo();
loadAbout();
loadSkills();
loadProjects();
loadCertificates();
</script>
</body>
</html>
