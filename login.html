<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f7fc;
}

.login-box{
background:white;
padding:40px;
width:400px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#2563eb;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

#msg{
margin-top:15px;
text-align:center;
color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Portfolio Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script>

/* ==========================
   SUPABASE CONFIG
========================== */

const supabaseUrl =
"https://aibktgsfztgcdwoqqzlw.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpYmt0Z3NmenRnY2R3b3Fxemx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjQ0ODcsImV4cCI6MjA5NjU0MDQ4N30.rXylwzImlx5ZdQMpDIeRGkXSS4hVaRAOTv4Op_Wsae0";

const supabaseClient =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* ==========================
   CHECK SESSION
========================== */

async function checkSession(){

const {
data:{session}
}
=
await supabaseClient
.auth
.getSession();

if(session){

window.location.href =
"dashboard.html";

}

}

checkSession();

/* ==========================
   LOGIN
========================== */

async function login(){

const email =
document
.getElementById("email")
.value
.trim();

const password =
document
.getElementById("password")
.value
.trim();

if(!email || !password){

document
.getElementById("msg")
.innerText =
"Enter Email & Password";

return;

}

document
.getElementById("msg")
.innerText =
"Logging in...";

const {
error
}
=
await supabaseClient
.auth
.signInWithPassword({

email,
password

});

if(error){

document
.getElementById("msg")
.innerText =
error.message;

return;

}

document
.getElementById("msg")
.style.color =
"green";

document
.getElementById("msg")
.innerText =
"Login Successful";

setTimeout(()=>{

window.location.href =
"dashboard.html";

},1000);

}

</script>

</body>
</html>
